<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tỏ tình ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
    <audio id="typingSound" src="typing.mp3" preload="auto"></audio>
</audio>

<div class="container">

    <h1 class="gradient-text">Em iu ơi ❤️</h1>

    <p id="typing" class="subtitle"></p>

    <div id="buttons" class="buttons hidden" >
        <button id="yesBtn">Đồng ý 💕</button>
        <button id="noBtn">Không 😢</button>
    </div>

    <div id="result">
        <h2>Yayyyy 💖</h2>
        <p>Giờ em là vợ iuuuu của anh rồi nhé 😳</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
